spring.application.name=university-management-system
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:mem:university;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=never

app.jwt.secret=${JWT_SECRET:university-management-system-local-development-secret}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000},http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001
